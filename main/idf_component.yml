## BRL Laptimer - Component Dependencies
dependencies:
  idf: ">=5.3.0"
  waveshare/esp32_p4_wifi6_touch_lcd_7b: "*"
  lvgl/lvgl:
    version: "9.2.*"
    public: true
  espressif/esp_hosted:
    # PIN to 2.10.0 — 2.11.x and 2.12.x have a xPortCheckValidTCBMem
    # regression that asserts on ESP32-P4 boot during ESP-Hosted init.
    # See GitHub issue espressif/esp-hosted #657 (similar symptom).
    # 2.10.0 is the last version before the buggy 2.11 series.
    version: "2.10.0"
  espressif/esp_wifi_remote:
    # 1.4.x and 1.5.x require esp_hosted >=2.11 (buggy).
    # Pin to 1.3.x — last series that tolerates esp_hosted 2.10.0.
    version: "~1.3.0"
  espressif/mdns:
    version: "*"
