name: Build Windows installers

# Trigger:
#   - Tag push "v*"        → baut alle Tools + hängt sie an ein Release
#   - Manual dispatch      → baut alle Tools, lädt nur Artefakte hoch
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version für die Installer (z.B. 1.0.0)"
        required: true
        default: "1.0.0"

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          - name: BDB-Track-Konverter
            spec: tools/bdb_format_gui.spec
            iss:  installer/bdb_setup.iss
            pkgs: "pycryptodome"
          - name: BRL-Format-Tool
            spec: tools/brl_format_gui.spec
            iss:  installer/brl_setup.iss
            pkgs: "pycryptodome"
          - name: TRX-Excel-Konverter
            spec: tools/trx_to_excel_gui.spec
            iss:  ""
            pkgs: "pycryptodome openpyxl"
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $v = "${{ github.ref_name }}" -replace "^v", ""
          } else {
            $v = "${{ github.event.inputs.version }}"
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "Building ${{ matrix.name }} v$v"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ${{ matrix.pkgs }}

      - name: Build EXE (PyInstaller)
        shell: pwsh
        run: pyinstaller --noconfirm ${{ matrix.spec }}

      - name: Install Inno Setup
        if: matrix.iss != ''
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        if: matrix.iss != ''
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ steps.ver.outputs.version }} `
            ${{ matrix.iss }}

      - name: Upload installer artifact
        if: matrix.iss != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-Setup-v${{ steps.ver.outputs.version }}
          path: dist/*-Setup-v${{ steps.ver.outputs.version }}.exe
          if-no-files-found: error

      - name: Upload portable EXE artifact (no-installer tools)
        if: matrix.iss == ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-v${{ steps.ver.outputs.version }}-portable
          path: dist/${{ matrix.name }}/**

  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.exe
          generate_release_notes: true
