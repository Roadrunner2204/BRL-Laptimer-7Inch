name: Build Windows installers

# Trigger:
#   - Tag push "v*"     → baut alle Tools + haengt sie an ein Release
#   - Manual dispatch   → baut alle Tools, laedt nur Artefakte hoch
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version fuer die Artefakte (z.B. 1.0.0)"
        required: true
        default: "1.0.0"

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        include:
          # Vereintes TRX/TRI/BRL Werkzeug — wird doppelt ausgeliefert:
          # eine portable onefile .exe UND ein Inno-Setup Installer der
          # in "Programme entfernen" registriert + sauber deinstallierbar ist.
          - name:    BRL-Can-Data-Tool
            spec:    tools/brl_can_data_tool.spec
            pkgs:    "pycryptodome openpyxl"
            iss:     installer/brl_can_data_tool_setup.iss
            onefile: true
          # BDB Track-Konverter (onedir-Build + Inno-Setup Installer)
          - name:    BDB-Track-Konverter
            spec:    tools/bdb_format_gui.spec
            pkgs:    "pycryptodome"
            iss:     installer/bdb_setup.iss
            onefile: false
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $v = "${{ github.ref_name }}" -replace "^v", ""
          } else {
            $v = "${{ github.event.inputs.version }}"
          }
          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "Building ${{ matrix.name }} v$v"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ${{ matrix.pkgs }}

      - name: Build EXE (PyInstaller)
        shell: pwsh
        run: pyinstaller --noconfirm ${{ matrix.spec }}

      - name: Install Inno Setup
        if: matrix.iss != ''
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        if: matrix.iss != ''
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion=${{ steps.ver.outputs.version }} `
            ${{ matrix.iss }}

      - name: Upload installer artifact
        if: matrix.iss != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-Setup-v${{ steps.ver.outputs.version }}
          path: dist/*-Setup-v${{ steps.ver.outputs.version }}.exe
          if-no-files-found: error

      # Portable onefile .exe — NUR wenn kein Installer konfiguriert ist.
      # (Sobald ein Tool seinen eigenen Inno-Setup-Installer hat, wollen wir
      # nicht parallel die portable .exe weiter ausliefern — User soll genau
      # einen klaren Weg haben zur Installation via Setup + Deinstallation
      # ueber "Apps & Features".)
      - name: Upload portable onefile EXE
        if: matrix.iss == '' && matrix.onefile == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-v${{ steps.ver.outputs.version }}-portable
          path: dist/${{ matrix.name }}.exe
          if-no-files-found: error

      # onedir-Build ohne Installer — ganzer Ordner als ZIP artefakt
      - name: Upload portable onedir EXE folder
        if: matrix.iss == '' && matrix.onefile != true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-v${{ steps.ver.outputs.version }}-portable
          path: dist/${{ matrix.name }}/**
          if-no-files-found: error

  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.exe
          generate_release_notes: true
