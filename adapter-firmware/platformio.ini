; =============================================================================
;  BRL OBD Adapter – ESP32-S3 Super Mini (4MB Flash, kein PSRAM)
; =============================================================================

[env:esp32s3-obd-adapter]
platform = espressif32@6.13.0
board = adafruit_feather_esp32s3_nopsram
framework = arduino
monitor_speed = 115200

; Flash-Größe auf 4MB überschreiben (Adafruit hat 8MB)
board_upload.flash_size = 4MB
board_build.flash_size = 4MB

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0
