; =============================================================================
;  BRL OBD Adapter – ESP32-S3 Super Mini (4MB Flash, kein PSRAM)
; =============================================================================

[env:esp32s3-obd-adapter]
platform = espressif32@6.13.0
board = adafruit_feather_esp32s3_nopsram
framework = arduino
monitor_speed = 115200

; Flash-Größe auf 4MB überschreiben (Adafruit hat 8MB)
board_upload.flash_size = 4MB
board_build.flash_size = 4MB

; Adafruit-Board zieht default 'default_8MB.csv' Partition-Layout.
; Auf einem 4MB-Chip läuft die SPIFFS-Partition über die Flash-Grenze
; und der Bootloader verweigert die Partition-Table.
; min_spiffs.csv: 1.9MB App, 190KB SPIFFS — passt in 4MB, viel App-Platz.
board_build.partitions = min_spiffs.csv

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0
